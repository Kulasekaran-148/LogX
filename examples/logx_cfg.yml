# ==========================================================
# LogX Configuration File (YML)
# ==========================================================
# This file defines logging behavior for your application.
# Each field corresponds to a configuration key in LogX.
# ==========================================================

# ---- Basic Information ----
name: "App Logger"
file_path: "./logs/app.log"

# ---- Log Output Control ----
enable_console_logging: true
enable_file_logging: true
enable_colored_logs: true
use_tty_detection: true
print_config: 1

# ---- Log Levels ----
# Options: TRACE | DEBUG | INFO | WARN | ERROR
console_level: "DEBUG"
file_level: "DEBUG"

# ---- Rotation Policy ----
# rotate_type options: BY_SIZE | BY_DATE
rotate_type: "BY_SIZE"
max_logfile_size_mb: 10
max_logfile_backups: 3
rotate_after_days: 1
# compress: gzip rotated backups (app.log.1.gz, app.log.2.gz, ...)
compress: 0
# delay_compress: leave the most-recently rotated file uncompressed for one rotation
delay_compress: 0

# ---- Appearance ----
banner_pattern: "=-"
